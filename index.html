<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ti Fanna</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="content">
            <h1>Para ti Fanna</h1>
            
            <!-- Rosa animada -->
            <div class="flower-container">
                <svg class="rose" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <!-- Tallo -->
                    <line x1="50" y1="100" x2="50" y2="50" stroke="#2d5016" stroke-width="2"/>
                    
                    <!-- Hojas -->
                    <ellipse cx="40" cy="75" rx="8" ry="12" fill="#3d7c2d" transform="rotate(-30 40 75)"/>
                    <ellipse cx="60" cy="75" rx="8" ry="12" fill="#3d7c2d" transform="rotate(30 60 75)"/>
                    
                    <!-- Pétalos exteriores (rojos oscuros) -->
                    <circle cx="50" cy="35" r="12" fill="#c41e3a"/>
                    <circle cx="65" cy="40" r="12" fill="#c41e3a"/>
                    <circle cx="60" cy="55" r="12" fill="#c41e3a"/>
                    <circle cx="40" cy="55" r="12" fill="#c41e3a"/>
                    <circle cx="35" cy="40" r="12" fill="#c41e3a"/>
                    
                    <!-- Pétalos medios (rojos más claros) -->
                    <circle cx="50" cy="42" r="10" fill="#e63946"/>
                    <circle cx="60" cy="45" r="10" fill="#e63946"/>
                    <circle cx="55" cy="52" r="10" fill="#e63946"/>
                    <circle cx="45" cy="52" r="10" fill="#e63946"/>
                    <circle cx="40" cy="45" r="10" fill="#e63946"/>
                    
                    <!-- Centro de la rosa -->
                    <circle cx="50" cy="48" r="6" fill="#ff6b6b"/>
                </svg>
            </div>
            
            <p class="message">Eres especial para mí</p>
            <p class="subtitle">Hecho con amor</p>
        </div>
    </div>
</body>
</html>
